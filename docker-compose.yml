services:
  db:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-talent_hub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-talent_hub}
      POSTGRES_DB: ${POSTGRES_DB:-talent_hub}
    ports:
      - "${PG_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready -U ${POSTGRES_USER:-talent_hub} -d ${POSTGRES_DB:-talent_hub}
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://talent_hub:talent_hub@db:5432/talent_hub?schema=public}
      - NODE_ENV=production
      - AUTH_URL=${AUTH_URL:-http://localhost:3000}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pg_data:
