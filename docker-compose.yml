services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      # PostgreSQL connection — all components are dynamic
      # Reference: postgres://postgres:4tlh02cZx7EHe9KZPIKFGG5cR9ilwNmlOLpnfb7bhLAQjB25mo4whudknuMZWGOz@xrvqwj5ynqw32fnlyqj9dqpb:5432/postgres
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
      - POSTGRES_HOST=${POSTGRES_HOST:?Set POSTGRES_HOST}
      - POSTGRES_DB=${POSTGRES_DB:-postgres}
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:5432/${POSTGRES_DB}
      - NODE_ENV=production
      # Set AUTH_URL to your production URL (e.g. https://your-app.coolify.app)
      # Must be set — NextAuth uses it for callback URLs and email links
      - AUTH_URL=${AUTH_URL:?Set AUTH_URL to your production URL}
