services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=file:./prisma/dev.db
      - NODE_ENV=production
    volumes:
      # Persist SQLite database between restarts
      - db_data:/app/prisma

volumes:
  db_data:
